<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>A Caminho - SearchTec</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      width: 100%;
      background: #ffe4ec;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      background: #ffd8e5;
      border-radius: 25px;
      padding: 10px 20px;
      box-shadow: 2px 3px 5px #ccc;
    }

    .search-bar {
      background: #ffeaf0;
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 6px 15px;
      width: 220px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: none;
      font-size: 14px;
    }

    .main-container {
      width: 90%;
      max-width: 1000px;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h2 {
      color: #ff4d7a;
      margin-bottom: 15px;
      text-align: center;
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .order-card {
      background: #fff;
      border: 1px solid #ffd8e5;
      border-radius: 10px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .order-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .order-card img {
      width: 40px;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .order-card p {
      font-size: 14px;
      font-weight: 500;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      background: #ffe4ec;
      padding: 12px;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
    }

    footer button {
      background: #ffeaf0;
      border: none;
      border-radius: 25px;
      padding: 8px 25px;
      font-weight: 500;
      font-size: 14px;
      box-shadow: inset 1px 2px 3px #ddd;
      cursor: pointer;
      transition: 0.2s;
    }

    footer button:hover {
      background: #ffd8e5;
    }

  </style>
</head>
<body>
<header>
  <div class="logo">SearchTec</div>
  <div class="search-bar"><input type="text" placeholder="Buscar..."></div>
</header>

<div class="main-container">
  <h2>Pedidos a Caminho</h2>

  <div class="orders-grid">
    <div class="order-card">
      <img src="carrinho-de-compras.png" alt="Pedido">
      <p>Pedido #1023</p>
      <p>Status: A caminho</p>
    </div>

    <div class="order-card">
      <img src="carrinho-de-compras.png" alt="Pedido">
      <p>Pedido #1045</p>
      <p>Status: A caminho</p>
    </div>

    <div class="order-card">
      <img src="carrinho-de-compras.png" alt="Pedido">
      <p>Pedido #1050</p>
      <p>Status: A caminho</p>
    </div>

    <div class="order-card">
      <img src="carrinho-de-compras.png" alt="Pedido">
      <p>Pedido #1072</p>
      <p>Status: A caminho</p>
    </div>
  </div>
</div>

<footer>
  <button onclick="location.href='index.html'">Início</button>
  <button onclick="location.href='alerta.html'">Alerta</button>
  <button onclick="location.href='ofertas.html'">Ofertas</button>
  <button onclick="location.href='carrinho.html'">Carrinho</button>
  <button onclick="location.href='perfil.html'">Perfil</button>
</footer>
</body>
</html>
