<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Finalizar Compra - SearchTec</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}
body {
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding-bottom: 80px;
}
header {
  width: 100%;
  background: #ffe4ec;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.logo {
  display: flex;
  align-items: center;
  background: #ffd8e5;
  border-radius: 25px;
  padding: 10px 20px;
  box-shadow: 2px 3px 5px #ccc;
  font-weight: 700;
  font-size: 20px;
}
.voltar {
  background: #e2c1cb;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-weight: 500;
  cursor: pointer;
}
.main {
  width: 90%;
  max-width: 900px;
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.box {
  background: #fff;
  border-radius: 8px;
  padding: 20px;
}
.linha {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.btn {
  background: #e2a8bb;
  border: none;
  border-radius: 8px;
  padding: 10px 15px;
  font-weight: 500;
  cursor: pointer;
  width: fit-content;
}
.final {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
}
.final span {
  background: #bdbdbd;
  border-radius: 6px;
  padding: 10px 20px;
  font-weight: 600;
}
.final button {
  background: #e2c1cb;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-weight: 600;
  cursor: pointer;
}
footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 15px;
  background: #ffe4ec;
  padding: 12px;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}
footer button {
  background: #ffeaf0;
  border: none;
  border-radius: 25px;
  padding: 8px 25px;
  font-weight: 500;
  font-size: 14px;
  box-shadow: inset 1px 2px 3px #ddd;
  cursor: pointer;
}
footer button:hover {
  background: #ffd8e5;
}
</style>
</head>
<body>
<header>
  <div class="logo">SearchTec</div>
  <a href="carrinho.html">
  <button class="voltar">Voltar ao carrinho</button>
  </a>
</header>

<div class="main">
  <div class="box">
    <div class="linha">
      <button class="btn">Entregar em #########</button>
      <button class="btn">Escolher novo endereço</button>
    </div>
    <div class="linha">
      <button class="btn">Escolher método de pagamento</button>
    </div>
    <div class="linha">
      <button class="btn">Ver parcelas</button>
    </div>
  </div>

  <div class="final">
    <span>Preço Final: R$ 6590,02</span>
    <button>FINALIZAR</button>
  </div>
</div>

<footer>
  <button onclick="location.href='index.html'">Início</button>
  <button onclick="location.href='alerta.html'">Alerta</button>
  <button onclick="location.href='ofertas.html'">Ofertas</button>
  <button onclick="location.href='carrinho.html'">Carrinho</button>
  <button onclick="location.href='perfil.html'">Perfil</button>
</footer>
</body>
</html>
