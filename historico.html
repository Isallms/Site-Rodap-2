<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Pesquisa - SearchTec</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 80px; 
    }

    header {
      width: 100%;
      background: #ffe4ec;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      background: #ffd8e5;
      border-radius: 25px;
      padding: 10px 20px;
      box-shadow: 2px 3px 5px #ccc;
    }

    .search-bar {
      background: #ffeaf0;
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 6px 15px;
      width: 220px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: none;
      font-size: 14px;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin-top: 30px;
      text-align: center;
    }

    .container h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 25px;
    }

    .search-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .search-card {
      background: #ffe4ec;
      border-radius: 10px;
      padding: 15px;
      width: 180px;
      text-align: center;
      box-shadow: 0 3px 5px rgba(0,0,0,0.1);
      transition: 0.2s ease;
      cursor: pointer;
    }

    .search-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 10px rgba(0,0,0,0.15);
    }

    .search-card img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .search-card p {
      font-size: 14px;
      font-weight: 500;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      background: #ffe4ec;
      padding: 12px;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
    }

    footer button {
      background: #ffeaf0;
      border: none;
      border-radius: 25px;
      padding: 8px 25px;
      font-weight: 500;
      font-size: 14px;
      box-shadow: inset 1px 2px 3px #ddd;
      cursor: pointer;
      transition: 0.2s;
    }

    footer button:hover {
      background: #ffd8e5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

  </style>
</head>
<body>
<header>
  <div class="logo">SearchTec</div>
  <div class="search-bar">
    <input type="text" placeholder="Pesquisar histórico...">
  </div>
</header>

<div class="container">
  <h2>Histórico de Pesquisa</h2>

  <div class="search-grid">

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Notebook X</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Mouse Gamer</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Headset Bluetooth</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>SSD 1TB</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Placa de Vídeo RTX</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Teclado Mecânico</p>
    </div>

    <div class="search-card">
      <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Pesquisa">
      <p>Carregador Portátil</p>
    </div>

  </div>
</div>

<footer>
  <button onclick="location.href='index.html'">Início</button>
  <button onclick="location.href='alerta.html'">Alerta</button>
  <button onclick="location.href='ofertas.html'">Ofertas</button>
  <button onclick="location.href='carrinho.html'">Carrinho</button>
  <button onclick="location.href='perfil.html'">Perfil</button>
</footer>
</body>
</html>
